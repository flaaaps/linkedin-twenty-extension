name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zip dist
        run: cd dist && zip -r ../linkedin-twenty-crm.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-twenty-crm
          path: linkedin-twenty-crm.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: linkedin-twenty-crm.zip
